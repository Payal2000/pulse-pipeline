steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/pulse-pipeline', '.']

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/pulse-pipeline']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'pulse-pipeline'
      - '--image'
      - 'gcr.io/$PROJECT_ID/pulse-pipeline'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '1Gi'
      - '--set-env-vars'
      - 'GEMINI_MODEL=${_GEMINI_MODEL},GOOGLE_CLOUD_PROJECT=$PROJECT_ID,BIGQUERY_DATASET=${_BIGQUERY_DATASET}'
      - '--set-secrets'
      - 'FIVETRAN_API_KEY=fivetran-api-key:latest,FIVETRAN_API_SECRET=fivetran-api-secret:latest'

substitutions:
  _GEMINI_MODEL: 'gemini-2.5-flash'
  _BIGQUERY_DATASET: 'pulse_pipeline'

images:
  - 'gcr.io/$PROJECT_ID/pulse-pipeline'
